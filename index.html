<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Towly</title>
    <meta name="description" content="Track and manage towel hygiene with personalized insights and reminders to maintain freshness and promote healthy daily towel routines." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA / theming -->
    <meta name="theme-color" content="#5A9E8C" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <!-- iOS standalone app support -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Towly" />

    <style>
      html, body { height: 100%; margin: 0; background: #FAF7F4; }
      #root { height: 100%; }
      /* Respect iPhone safe areas when running as standalone PWA */
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
